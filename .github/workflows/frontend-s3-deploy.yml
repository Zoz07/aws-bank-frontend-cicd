name: Frontend Deploy to S3

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-s3-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-s3-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required repository variables
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing repository variable: AWS_REGION"
            exit 1
          fi
          if [ -z "${S3_BUCKET_NAME}" ]; then
            echo "Missing repository variable: S3_BUCKET_NAME"
            exit 1
          fi
          if [ -z "${REACT_APP_BACKEND_URL}" ]; then
            echo "Missing repository variable: REACT_APP_BACKEND_URL"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::678536383119:role/GitHubActionsFrontendDeployRole
          role-session-name: github-actions-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify S3 bucket access
        run: aws s3api head-bucket --bucket "${S3_BUCKET_NAME}"

      - name: Upload static assets to S3
        run: aws s3 sync frontend/build "s3://${S3_BUCKET_NAME}" --delete

      - name: Set no-cache headers on index.html
        run: |
          aws s3 cp frontend/build/index.html "s3://${S3_BUCKET_NAME}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' && startsWith(env.CLOUDFRONT_DISTRIBUTION_ID, 'E') }}
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
